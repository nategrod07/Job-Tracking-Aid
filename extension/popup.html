<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Job Application Tracker</title>
  <style>
    :root {
      --bg: #ffffff;
      --panel: #ffffff;
      --text: #1a1a1a;
      --muted: #666;
      --border: #dfe3e8;
      --stripe: #f7f8fa;
      --hover: #eef2ff;
      --accent: #2563eb;
      --accent-text: #ffffff;
      --good: #16a34a;
      --bad: #dc2626;
      --shadow-sm: 0 1px 2px rgba(16,24,40,0.06);
      --radius-sm: 6px;
      --radius-md: 10px;
    }
    html[data-theme="dark"] {
      --bg: #14161a;
      --panel: #1c1f26;
      --text: #e7e9ee;
      --muted: #9aa2af;
      --border: #2c3038;
      --stripe: #1a1d24;
      --hover: #232a3d;
      --accent: #3b82f6;
      --accent-text: #ffffff;
      --good: #4ade80;
      --bad: #f87171;
      --shadow-sm: 0 1px 2px rgba(0,0,0,0.3);
    }
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      width: 360px;
      margin: 0;
      padding: 14px;
      color: var(--text);
      background: var(--bg);
    }
    h1 {
      font-size: 15px;
      font-weight: 700;
      letter-spacing: -0.01em;
      margin: 0 0 10px 0;
    }
    .toolbar {
      display: flex;
      gap: 8px;
      margin-bottom: 8px;
    }
    button {
      font-size: 12px;
      padding: 7px 10px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      background: var(--panel);
      color: var(--text);
      cursor: pointer;
      transition: background 0.12s ease, border-color 0.12s ease, transform 0.08s ease;
    }
    button:hover { background: var(--hover); }
    button:active { transform: scale(0.97); }
    button.primary {
      background: var(--accent);
      color: var(--accent-text);
      border-color: var(--accent);
      flex: 1;
      font-weight: 600;
    }
    button.danger-pending { color: var(--bad); border-color: var(--bad); }
    #list {
      max-height: 340px;
      overflow-y: auto;
      margin-top: 12px;
    }
    .entry {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      box-shadow: var(--shadow-sm);
      padding: 9px 10px;
      margin-bottom: 7px;
      font-size: 12px;
      position: relative;
    }
    .entry .site {
      text-transform: uppercase;
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 0.04em;
      font-weight: 600;
    }
    .entry .title {
      font-weight: 600;
      margin: 3px 0;
      padding-right: 50px;
    }
    .entry .meta { color: var(--muted); }
    .entry .delete {
      position: absolute;
      top: 8px;
      right: 8px;
      font-size: 10px;
      padding: 2px 7px;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: var(--panel);
      color: var(--bad);
      cursor: pointer;
    }
    .empty {
      color: var(--muted);
      text-align: center;
      padding: 30px 10px;
    }
    .empty .empty-icon { color: var(--muted); opacity: 0.5; margin-bottom: 8px; }
    .empty .empty-title { font-weight: 600; color: var(--text); font-size: 12px; margin-bottom: 3px; }
    .empty .empty-hint { font-size: 11px; }
  </style>
</head>
<body>
  <h1>Job Application Tracker</h1>
  <div class="toolbar">
    <button id="dashboardBtn" class="primary">Open Dashboard</button>
  </div>
  <div class="toolbar">
    <button id="exportBtn">Export &amp; clear (backup)</button>
    <button id="clearBtn">Clear only</button>
  </div>
  <div id="list"></div>
  <script src="popup.js"></script>
</body>
</html>
