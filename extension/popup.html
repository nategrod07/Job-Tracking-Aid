<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Job Application Tracker</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      width: 360px;
      margin: 0;
      padding: 12px;
      color: #1a1a1a;
    }
    h1 {
      font-size: 14px;
      margin: 0 0 8px 0;
    }
    .toolbar {
      display: flex;
      gap: 8px;
      margin-bottom: 10px;
    }
    button {
      font-size: 12px;
      padding: 6px 10px;
      border: 1px solid #d0d0d0;
      border-radius: 6px;
      background: #f7f7f7;
      cursor: pointer;
    }
    button.primary {
      background: #2563eb;
      color: white;
      border-color: #2563eb;
    }
    #list {
      max-height: 320px;
      overflow-y: auto;
    }
    .entry {
      border: 1px solid #e5e5e5;
      border-radius: 6px;
      padding: 8px;
      margin-bottom: 6px;
      font-size: 12px;
      position: relative;
    }
    .entry .site {
      text-transform: uppercase;
      font-size: 10px;
      color: #666;
      letter-spacing: 0.03em;
    }
    .entry .title {
      font-weight: 600;
      margin: 2px 0;
    }
    .entry .meta {
      color: #555;
    }
    .entry .delete {
      position: absolute;
      top: 6px;
      right: 6px;
      font-size: 11px;
      padding: 2px 6px;
      border: none;
      background: transparent;
      color: #b00;
      cursor: pointer;
    }
    .empty {
      color: #888;
      font-size: 12px;
      text-align: center;
      padding: 20px 0;
    }
  </style>
</head>
<body>
  <h1>Job Application Tracker</h1>
  <div class="toolbar">
    <button id="dashboardBtn" class="primary">Open Dashboard</button>
  </div>
  <div class="toolbar" style="margin-top:-4px;">
    <button id="exportBtn">Export &amp; clear (backup)</button>
    <button id="clearBtn">Clear only</button>
  </div>
  <div id="list"></div>
  <script src="popup.js"></script>
</body>
</html>
